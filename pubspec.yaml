name: flutter_abp_proxy
description: >-
  ABP Framework proxy generator for Flutter. Generates Retrofit services
  and Freezed models from a running ABP backend API definition.
version: 0.2.1
homepage: https://tekthar.com
repository: https://github.com/tekthar/flutter-abp-proxy
issue_tracker: https://github.com/tekthar/flutter-abp-proxy/issues

topics:
  - abp
  - code-generation
  - retrofit
  - freezed

screenshots:
  - description: 'CLI dry-run output showing generated models, services, and barrels.'
    path: screenshots/cli_dry_run.png

funding:
  - https://github.com/sponsors/tekthar

environment:
  sdk: ^3.0.0

dependencies:
  args: ^2.4.0
  path: ^1.9.0

dev_dependencies:
  lints: ^5.1.0
  test: ^1.25.0

executables:
  flutter_abp_proxy: flutter_abp_proxy
